<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escala em Finalizacao</title>
<style>
:root {
    --bg-1: #fff8ef;
    --bg-2: #f5efe6;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #4b5563;
    --accent: #0f766e;
    --accent-soft: #ccfbf1;
    --border: #d1d5db;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at 15% 20%, #fde68a 0 120px, transparent 121px),
        radial-gradient(circle at 85% 80%, #99f6e4 0 140px, transparent 141px),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
}

.notice {
    width: min(700px, 100%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 30px 24px;
    box-shadow: 0 14px 35px rgba(0, 0, 0, 0.08);
    text-align: center;
}

.badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 999px;
    padding: 7px 12px;
    margin-bottom: 16px;
}

h1 {
    font-size: clamp(24px, 5vw, 36px);
    line-height: 1.1;
    margin-bottom: 12px;
}

p {
    font-size: clamp(16px, 2.5vw, 19px);
    line-height: 1.55;
    color: var(--muted);
}

.highlight {
    color: var(--accent);
    font-weight: 700;
}

.footer {
    margin-top: 20px;
    font-size: 14px;
    color: #6b7280;
}
</style>
</head>
<body>
    <main class="notice" role="main" aria-labelledby="titulo-aviso">
        <span class="badge">Aviso Temporario</span>
        <h1 id="titulo-aviso">Escala em finalizacao</h1>
        <p>
            Estamos concluindo os ajustes finais da escala.
            Ela sera disponibilizada <span class="highlight">amanha, 06/04/2026</span>.
        </p>
        <p class="footer">Obrigado pela compreensao.</p>
    </main>
</body>
</html>
